version: "3.8"

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: cqa-postgres-test
    environment:
      POSTGRES_DB: cqa_test
      POSTGRES_USER: cqa_test
      POSTGRES_PASSWORD: cqa_test_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cqa_test -d cqa_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
