version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cqa_test
      POSTGRES_USER: cqa
      POSTGRES_PASSWORD: cqa_test_pass
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cqa -d cqa_test']
      interval: 5s
      timeout: 3s
      retries: 5
