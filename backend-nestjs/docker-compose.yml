version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cqa-nestjs-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - file_storage:/var/lib/cqa/files
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:16-alpine
    container_name: cqa-nestjs-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cqa}
      POSTGRES_USER: ${DB_USER:-cqa}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cqa} -d ${DB_NAME:-cqa}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  file_storage:
